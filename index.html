<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            min-height: 100vh;
        }

        .texto {
            width: 30%;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .galeria {
            width: 70%;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background-color: #ffffff;
        }

        .galeria img {
            max-width: 300px;
            width: 100%;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="texto">
        <h1>Mi Portafolio</h1>
        <p>
            Hola, soy Joshua y este es mi espacio para mostrar trabajos de
            modelado 3D, ingeniería inversa y proyectos técnicos.
        </p>
        <p>
            Con el tiempo voy a ir agregando más imágenes y proyectos.
        </p>
    </div>

    <div class="galeria">
        <!-- Ejemplo de imágenes -->
        <img src="imagenes/proyecto1.jpg" alt="Proyecto 1">
        <img src="imagenes/proyecto2.jpg" alt="Proyecto 2">
        <img src="imagenes/proyecto3.jpg" alt="Proyecto 3">
    </div>
</body>
</html>
