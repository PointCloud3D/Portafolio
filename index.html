<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background-image: url("imagenes/fondo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .texto {
            width: 30%;
            padding: 20px;
            position: relative;
            color: #fff;
            background-image: url("imagenes/fondoportada.png");
            background-size: cover;
            background-position: center;
        }

        .texto::before {
            content: "";
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .texto h1, .texto p {
            position: relative;
            z-index: 1;
        }

        .galeria {
            width: 70%;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: flex-start;
            background-color: rgba(255, 255, 255, 0.8);
        }

        .galeria img {
            max-width: 100%;
            height: auto; /* mantiene proporción */
            border: 1px solid #ccc;
            border-radius: 5px;
            object-fit: contain; /* evita deformación */
            flex: 1 1 300px; /* se adapta al espacio disponible */
        }
    </style>
</head>
<body>
    <div class="texto">
        <h1>Mi Portafolio</h1>
        <p>
            Hola, soy Joshua y este es mi espacio para mostrar trabajos de
            modelado 3D, ingeniería inversa y proyectos técnicos.
        </p>
        <p>
            Con el tiempo voy a ir agregando más imágenes y proyectos.
        </p>
    </div>

    <div class="galeria">
        <img src="imagenes/proyecto1.png" alt="Proyecto 1">
        <img src="imagenes/proyecto2.png" alt="Proyecto 2">
        <img src="imagenes/proyecto3.jpg" alt="Proyecto 3">
    </div>
</body>
</html>
